<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valentine</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <section class="container">
    <div class="image-wrapper">
      <img src="image.png" alt="펭귄 이미지" class="image" />
      <div class="yeahMoji heart">💕</div>
      <div class="yeahMoji kiss">😘</div>
      <div class="yeahMoji confeti">🎉</div>
      <div class="yeahMoji cake">🎂</div>
      <div class="yeahMoji ballon">🎈</div>
      <div class="yeahMoji cutlery">🍴</div>
      <div class="noMoji tears">💧</div>
      <div class="noMoji tears2">💧</div>
      <div class="noMoji shock">😦</div>
      <div class="noMoji scream">🤬</div>
    </div>

    <p class="title">
      Will you be my Valentine?
    </p>
    <div class="button-container">
      <button class="button yes-button">YES</button>
      <button class="button no-button">NO ...</button>
    </div>
  </section>
  <div class="modal-overlay">
    <div class="modal-title"></div>
    <button class="modal-button"></button>
  </div>

  <script type="module" src="index.js"></script>
</body>

</html>
